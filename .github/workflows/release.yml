name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Package web bundle
        run: |
          tar czf "cap-web-${{ github.ref_name }}.tar.gz" dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: cap-web
          path: cap-web-${{ github.ref_name }}.tar.gz

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release artifact
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Extract release notes from tag
        run: |
          NOTES=$(git tag -l --format='%(contents:body)' "${{ github.ref_name }}")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          body_path: /tmp/release-notes.md
          files: release/*
